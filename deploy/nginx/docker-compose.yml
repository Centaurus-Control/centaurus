# docker-compose.nginx.yml
services:
  centaurus-nginx:
    image: nginx:1.27-alpine
    container_name: centaurus-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/certs:/etc/nginx/certs:ro