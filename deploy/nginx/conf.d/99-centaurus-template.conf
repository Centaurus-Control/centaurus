upstream centaurus_webui {
    server 127.0.0.1:8081;
    keepalive 16;
}

upstream centaurus_server {
    server 127.0.0.1:8080;
    keepalive 16;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

server {
    listen 80;
    server_name centaurus.lan;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    http2 on;
    server_name centaurus.lan;

    ssl_certificate /etc/nginx/certs/centaurus.crt;
    ssl_certificate_key /etc/nginx/certs/centaurus.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:centaurus_ssl:10m;
    ssl_session_timeout 1d;

    client_max_body_size 25m;

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;

    location /api/machines/events {
        proxy_pass http://centaurus_server;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    location /agent/ws {
        proxy_pass http://centaurus_server;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 1h;
        proxy_send_timeout 1h;
    }

    location /api/ {
        proxy_pass http://centaurus_server;
    }

    location /actuator/ {
        proxy_pass http://centaurus_server;
    }

    location / {
        proxy_pass http://centaurus_webui;
    }
}
