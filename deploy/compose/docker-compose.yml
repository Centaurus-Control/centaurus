services:
  webui:
    image: "${CENTAURUS_WEBUI_IMAGE:-centaurus-webui:2.0.0}"
    pull_policy: "${CENTAURUS_WEBUI_PULL_POLICY:-missing}"
    container_name: centaurus-webui
    restart: unless-stopped
    ports:
      - "${CENTAURUS_WEBUI_HTTP_PORT:-8081}:80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  server:
    image: "${CENTAURUS_SERVER_IMAGE:-centaurus-server:2.0.0}"
    pull_policy: "${CENTAURUS_SERVER_PULL_POLICY:-missing}"
    container_name: centaurus-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${CENTAURUS_SERVER_HTTP_PORT:-8080}:8080"
    environment:
      CENTAURUS_SERVER_PORT: "8080"
      CENTAURUS_DB_URL: "jdbc:postgresql://postgres:5432/${POSTGRES_DB}"
      CENTAURUS_DB_USERNAME: "${POSTGRES_USER}"
      CENTAURUS_DB_PASSWORD: "${POSTGRES_PASSWORD}"
      CENTAURUS_JPA_DDL_AUTO: "${CENTAURUS_JPA_DDL_AUTO:-validate}"
      CENTAURUS_FLYWAY_ENABLED: "${CENTAURUS_FLYWAY_ENABLED:-true}"
      CENTAURUS_FLYWAY_BASELINE_ON_MIGRATE: "${CENTAURUS_FLYWAY_BASELINE_ON_MIGRATE:-true}"
      CENTAURUS_FLYWAY_BASELINE_VERSION: "${CENTAURUS_FLYWAY_BASELINE_VERSION:-1}"
      CENTAURUS_AUTH_ACCESS_TOKEN_TTL: "${CENTAURUS_AUTH_ACCESS_TOKEN_TTL:-15m}"
      CENTAURUS_AUTH_REFRESH_TOKEN_TTL: "${CENTAURUS_AUTH_REFRESH_TOKEN_TTL:-365d}"
      CENTAURUS_AUTH_REFRESH_COOKIE_NAME: "${CENTAURUS_AUTH_REFRESH_COOKIE_NAME:-centaurus_refresh_token}"
      CENTAURUS_AUTH_REFRESH_COOKIE_SECURE_MODE: "${CENTAURUS_AUTH_REFRESH_COOKIE_SECURE_MODE:-AUTO}"
      CENTAURUS_AUTH_JWT_SECRET: "${CENTAURUS_AUTH_JWT_SECRET}"
      CENTAURUS_BOOTSTRAP_ADMIN_USERNAME: "${CENTAURUS_BOOTSTRAP_ADMIN_USERNAME:-admin}"
      CENTAURUS_BOOTSTRAP_ADMIN_PASSWORD: "${CENTAURUS_BOOTSTRAP_ADMIN_PASSWORD}"
      CENTAURUS_ENROLLMENT_TOKEN_TTL: "${CENTAURUS_ENROLLMENT_TOKEN_TTL:-1h}"
      CENTAURUS_ENROLLMENT_SERVER_URL: "${CENTAURUS_ENROLLMENT_SERVER_URL}"
      CENTAURUS_ENROLLMENT_WS_URL: "${CENTAURUS_ENROLLMENT_WS_URL}"
      JAVA_OPTS: "${JAVA_OPTS:-}"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12

  postgres:
    image: postgres:18-alpine
    container_name: centaurus-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - centaurus-postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  centaurus-postgres-data:
